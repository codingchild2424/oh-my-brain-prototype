      .arrow{stroke:#10a37f;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
      .soft{stroke:#7c8b99;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
      @media (prefers-color-scheme: dark){
        .card{fill:#18231f;stroke:#10a37f}
        .title{fill:#d2d8df}
        .caption{fill:#93a4b5}
        .icon{stroke:#a9b7c5}
        .soft{stroke:#93a4b5}
      }
    </style>

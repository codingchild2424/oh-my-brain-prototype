      <path d="M1 1L9 5L1 9" fill="none" stroke="#10a37f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .card{fill:#eef3f0;stroke:#10a37f;stroke-width:2}
